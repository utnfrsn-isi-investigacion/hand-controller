; PlatformIO configuration for hand-controller ESP8266 firmware
; Docs: https://docs.platformio.org/page/projectconf.html

[platformio]
; Source lives in the existing main/ subdirectory
src_dir = main

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Match the baud rate defined in config.h
monitor_speed = 115200
