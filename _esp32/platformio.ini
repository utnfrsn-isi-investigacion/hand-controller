; PlatformIO configuration for hand-controller ESP32 firmware
; Docs: https://docs.platformio.org/page/projectconf.html

[platformio]
; Source lives in the existing main/ subdirectory
src_dir = main
; Keep USB the default build/upload target now that esp32dev-ota exists —
; without this, a bare `pio run` builds every environment.
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Match the baud rate defined in config.h
monitor_speed = 115200

[env:esp32dev-ota]
; OTA upload over WiFi via ArduinoOTA, once the device already has firmware
; with OTA support flashed over USB and OTA_PASSWORD_HASH set in secrets.h.
extends = env:esp32dev
upload_protocol = espota
; Assumes the default MDNS_NAME ("esp32") from secrets.h — if you changed
; it, override with `make upload-ota OTA_HOST=your_name.local`.
upload_port = esp32.local
upload_flags = --auth=${sysenv.OTA_PASSWORD}
